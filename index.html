<!doctype html>
<html lang="en" data-scheme="deep-sea">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#04141f" />
    <title>Akha</title>
    <!-- Apply the stored scheme before first paint to avoid a flash of the
         default (Deep Sea) for users on a non-default/light scheme. usePrefs
         reconciles + validates this on mount. -->
    <script>
      try {
        var p = JSON.parse(localStorage.getItem('akha_prefs') || '{}');
        if (p && typeof p.scheme === 'string' && p.scheme) {
          document.documentElement.setAttribute('data-scheme', p.scheme);
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
